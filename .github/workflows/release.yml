name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop bundle (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix desktop ci

      # tauri-action owns release creation: it creates the draft release for the
      # tag on the first matrix job and uploads each platform's bundle to it.
      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Godot MCP ${{ github.ref_name }}'
          releaseBody: 'Desktop app (macOS / Linux / Windows) + bundled MCP server. Download the installer for your platform below. The npm package tarball is also attached.'
          releaseDraft: true
          prerelease: false

  npm-asset:
    name: Attach npm tarball
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm pack

      - name: Upload tarball and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" *.tgz --clobber
          # Everything (all platform installers + tarball) is attached now: go live.
          gh release edit "${{ github.ref_name }}" --draft=false
